---   # rust-bitcoin CI: If you edit this file please update README.md
on:   # yamllint disable-line rule:truthy
  push:
    branches:
      - master
      - 'test-ci/**'
  pull_request:

name: Continuous integration

env:
  RBMT_VERSION: "94f631e1ef8fc1bbbcbb85f09488537e7dd0587c"

jobs:
  Stable:                       # 2 jobs, one per lock file.
    name: Test - stable toolchain
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dep: [minimal, recent]
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Setup cargo-rbmt"
        uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@94f631e1ef8fc1bbbcbb85f09488537e7dd0587c
        with:
          rbmt-version: ${{ env.RBMT_VERSION }}
      - name: "Run test script"
        run: >
          cargo rbmt --lock-file ${{ matrix.dep }}
          --package bitreq
          --package client
          --package jsonrpc
          --package types
          test --toolchain stable

  Nightly:                      # 2 jobs, one per lock file.
    name: Test - nightly toolchain
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dep: [minimal, recent]
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Setup cargo-rbmt"
        uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@94f631e1ef8fc1bbbcbb85f09488537e7dd0587c
        with:
          rbmt-version: ${{ env.RBMT_VERSION }}
      - name: "Run test script"
        run: >
          cargo rbmt --lock-file ${{ matrix.dep }}
          --package bitreq
          --package client
          --package jsonrpc
          --package types
          test --toolchain nightly

  MSRV:                         # 2 jobs, one per lock file.
    name: Test - 1.75.0 toolchain
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dep: [minimal, recent]
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Setup cargo-rbmt"
        uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@94f631e1ef8fc1bbbcbb85f09488537e7dd0587c
        with:
          rbmt-version: ${{ env.RBMT_VERSION }}
      - name: "Run test script"
        run: >
          cargo rbmt --lock-file ${{ matrix.dep }}
          --package bitreq
          --package client
          --package jsonrpc
          --package types
          test --toolchain msrv

  Lint:
    name: Lint - nightly toolchain
    runs-on: ubuntu-latest
    env:
      BITCOIND_SKIP_DOWNLOAD: "1"
    strategy:
      fail-fast: false
      matrix:
        dep: [recent]
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Setup cargo-rbmt"
        uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@94f631e1ef8fc1bbbcbb85f09488537e7dd0587c
        with:
          rbmt-version: ${{ env.RBMT_VERSION }}
      - name: "Run test script"
        run: |
          cargo rbmt --lock-file ${{ matrix.dep }} \
            --package bitreq \
            --package client \
            --package jsonrpc \
            --package types \
            lint
          ./contrib/lint-integtation-tests.sh
          ./contrib/lint-verify.sh

  Docs:
    name: Docs - stable toolchain
    runs-on: ubuntu-latest
    env:
      BITCOIND_SKIP_DOWNLOAD: "1"
    strategy:
      fail-fast: false
      matrix:
        dep: [recent]
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Setup cargo-rbmt"
        uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@94f631e1ef8fc1bbbcbb85f09488537e7dd0587c
        with:
          rbmt-version: ${{ env.RBMT_VERSION }}
      - name: "Run test script"
        run: cargo rbmt --lock-file ${{ matrix.dep }} docs

  Docsrs:
    name: Docs - nightly toolchain
    runs-on: ubuntu-latest
    env:
      BITCOIND_SKIP_DOWNLOAD: "1"
    strategy:
      fail-fast: false
      matrix:
        dep: [recent]
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Setup cargo-rbmt"
        uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@94f631e1ef8fc1bbbcbb85f09488537e7dd0587c
        with:
          rbmt-version: ${{ env.RBMT_VERSION }}
      - name: "Run test script"
        run: cargo rbmt --lock-file ${{ matrix.dep }} docsrs

  Format:                       # 1 job, run `cargo rbmt fmt --check`.
    name: Format - nightly toolchain
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Setup cargo-rbmt"
        uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@94f631e1ef8fc1bbbcbb85f09488537e7dd0587c
        with:
          rbmt-version: ${{ env.RBMT_VERSION }}
      - name: "Check formatting"
        run: |
          cargo rbmt fmt --check
          ./contrib/fmt-integration-tests.sh
          ./contrib/fmt-verify.sh

  Verify:                       #  1 job, run `verify` directly.
    name: Verify - stable toolchain
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Select toolchain"
        uses: dtolnay/rust-toolchain@stable
      - name: "Run the verify program"
        # Verify all versions (known to the verify program)
        run: cd verify && cargo run all

  Integration:                  # 1 job for each bitcoind version we support.
    name: Integration tests - stable toolchain
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          [
            "30_2",
            # Don't integration test v30.0 and v30.1 as the binaries have been
            # removed due to a wallet migration bug.
            "29_0",
            "28_2",
            "28_1",
            "28_0",
            "27_2",
            "27_1",
            "27_0",
            "26_2",
            "25_2",
            "24_2",
            "23_2",
            "22_1",
            "0_21_2",
            "0_20_2",
            "0_19_1",
            "0_18_1",
            "0_17_2",
          ]
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Select toolchain"
        uses: dtolnay/rust-toolchain@stable
      - name: "Cache downloaded bitcoind"
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/corepc/bitcoind
          key: bitcoind-${{ runner.os }}-${{ runner.arch }}-${{ matrix.version }}
      - name: "Run integration tests"
        env:
          BITCOIND_DOWNLOAD_DIR: ${{ github.workspace }}/.cache/corepc/bitcoind
        run: cd integration_test && cargo test --features=${{ matrix.version }},download
