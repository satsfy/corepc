---   # rust-bitcoin CI: If you edit this file please update README.md
on:   # yamllint disable-line rule:truthy
  push:
    branches:
      - master
      - 'test-ci/**'
  pull_request:

name: Continuous integration

jobs:
  Prepare:
    runs-on: ubuntu-latest
    outputs:
      rbmt_version: ${{ steps.read_rbmt_version.outputs.value }}
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Read rbmt version"
        id: read_rbmt_version
        run: echo "value=$(cat rbmt-version)" >> "$GITHUB_OUTPUT"

  Test: # 6 jobs: 3 toolchains × 2 lock files.
    name: Test - ${{ matrix.toolchain }} toolchain (${{ matrix.dep }})
    needs: Prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dep: [minimal, recent]
        toolchain: [stable, nightly, msrv]
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@6560b728ae6a81af9d92713b630ba26772fbd970 # v0.1.0
        with:
          rbmt-version: ${{ needs.Prepare.outputs.rbmt_version }}
      - name: "Cache downloaded bitcoind"
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/corepc/bitcoind
          key: bitcoind-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.toml', 'node/Cargo.toml', 'node/build.rs', 'node/src/versions.rs', 'node/sha256/**') }}
      - name: "Prepare bitcoind"
        env:
          BITCOIND_DOWNLOAD_DIR: ${{ github.workspace }}/.cache/corepc/bitcoind
        run: |
          cp "Cargo-${{ matrix.dep }}.lock" Cargo.lock
          cargo +stable --locked build --manifest-path node/Cargo.toml --no-default-features --features download,latest
          BITCOIND_EXE="$(find "$BITCOIND_DOWNLOAD_DIR" -type f -path '*/bitcoin-*/bin/bitcoind' | sort -V | tail -n 1)"
          if [ -z "$BITCOIND_EXE" ]; then
            echo "failed to locate downloaded bitcoind binary in $BITCOIND_DOWNLOAD_DIR"
            exit 1
          fi
          echo "BITCOIND_EXE=$BITCOIND_EXE" >> "$GITHUB_ENV"
      - name: "Run ${{ matrix.toolchain }} tests"
        run: |
          # `corepc-node` requires an explicit version feature, so run rbmt tests on the
          # rest of the workspace and test `corepc-node` separately with `latest`.
          cargo rbmt --lock-file ${{ matrix.dep }} test --toolchain ${{ matrix.toolchain }} \
            -p bitreq \
            -p corepc-client \
            -p jsonrpc-fuzz \
            -p jsonrpc \
            -p corepc-types

          case "${{ matrix.toolchain }}" in
            stable) RUSTUP_TOOLCHAIN="stable" ;;
            nightly) RUSTUP_TOOLCHAIN="$(cat nightly-version)" ;;
            msrv) RUSTUP_TOOLCHAIN="$(cargo rbmt toolchains --msrv)" ;;
            *) echo "unknown toolchain '${{ matrix.toolchain }}'"; exit 1 ;;
          esac

          cargo +"$RUSTUP_TOOLCHAIN" --locked test --manifest-path node/Cargo.toml
          cargo +"$RUSTUP_TOOLCHAIN" --locked test --manifest-path node/Cargo.toml --all-features
          cargo +"$RUSTUP_TOOLCHAIN" --locked test --manifest-path node/Cargo.toml --no-default-features --features latest

  Lint:
    name: Lint - nightly toolchain
    needs: Prepare
    runs-on: ubuntu-latest
    env:
      BITCOIND_SKIP_DOWNLOAD: "1"
    strategy:
      fail-fast: false
      matrix:
        dep: [recent]
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@6560b728ae6a81af9d92713b630ba26772fbd970 # v0.1.0
        with:
          rbmt-version: ${{ needs.Prepare.outputs.rbmt_version }}
      - name: "Run lints"
        run: |
          # `corepc-node` requires an explicit version feature.
          cargo rbmt --lock-file ${{ matrix.dep }} lint \
            -p bitreq \
            -p corepc-client \
            -p jsonrpc-fuzz \
            -p jsonrpc \
            -p corepc-types
          cargo +$(cat nightly-version) clippy --manifest-path node/Cargo.toml --all-targets --all-features -- -D warnings
          cargo +$(cat nightly-version) clippy --manifest-path node/Cargo.toml --all-targets --no-default-features --features latest -- -D warnings
          ./contrib/lint-integration-tests.sh
          ./contrib/lint-verify.sh

  Docs:
    name: Docs - stable toolchain
    needs: Prepare
    runs-on: ubuntu-latest
    env:
      BITCOIND_SKIP_DOWNLOAD: "1"
    strategy:
      fail-fast: false
      matrix:
        dep: [recent]
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@6560b728ae6a81af9d92713b630ba26772fbd970 # v0.1.0
        with:
          rbmt-version: ${{ needs.Prepare.outputs.rbmt_version }}
      - name: "Run doc tests"
        run: cargo rbmt --lock-file ${{ matrix.dep }} docs

  Docsrs:
    name: Docs - nightly toolchain
    needs: Prepare
    runs-on: ubuntu-latest
    env:
      BITCOIND_SKIP_DOWNLOAD: "1"
    strategy:
      fail-fast: false
      matrix:
        dep: [recent]
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@6560b728ae6a81af9d92713b630ba26772fbd970 # v0.1.0
        with:
          rbmt-version: ${{ needs.Prepare.outputs.rbmt_version }}
      - name: "Run docsrs tests"
        run: cargo rbmt --lock-file ${{ matrix.dep }} docsrs

  Format:                       #  1 job, run cargo fmt directly.
    name: Format - nightly toolchain
    needs: Prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@6560b728ae6a81af9d92713b630ba26772fbd970 # v0.1.0
        with:
          rbmt-version: ${{ needs.Prepare.outputs.rbmt_version }}
      - name: "Check formatting"
        run: |
          cargo rbmt fmt --check
          ./contrib/fmt-integration-tests.sh
          ./contrib/fmt-verify.sh

  Verify:                       #  1 job, run `verify` directly.
    name: Verify - stable toolchain
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - name: "Select toolchain"
        uses: dtolnay/rust-toolchain@stable
      - name: "Run the verify program"
        # Verify all versions (known to the verify program)
        run: cd verify && cargo run all

  Integration:                  # 1 job for each bitcoind version we support.
    name: Integration tests - stable toolchain
    needs: Prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          [
            "30_2",
            # Don't integration test v30.0 and v30.1 as the binaries have been
            # removed due to a wallet migration bug.
            "29_0",
            "28_2",
            "28_1",
            "28_0",
            "27_2",
            "27_1",
            "27_0",
            "26_2",
            "25_2",
            "24_2",
            "23_2",
            "22_1",
            "0_21_2",
            "0_20_2",
            "0_19_1",
            "0_18_1",
            "0_17_2",
          ]
    steps:
      - name: "Checkout repo"
        uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@6560b728ae6a81af9d92713b630ba26772fbd970 # v0.1.0
        with:
          rbmt-version: ${{ needs.Prepare.outputs.rbmt_version }}
      - name: "Cache downloaded bitcoind"
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/corepc/bitcoind
          key: bitcoind-${{ runner.os }}-${{ runner.arch }}-${{ matrix.version }}
      - name: "Run integration tests"
        env:
          BITCOIND_DOWNLOAD_DIR: ${{ github.workspace }}/.cache/corepc/bitcoind
        run: cd integration_test && cargo test --features=${{ matrix.version }},download
